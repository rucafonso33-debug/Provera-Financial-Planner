name: Build Android Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm install

      - name: Build and sync Capacitor
        run: npm run build:mobile

      - name: Restore registered Android signing key
        run: |
          git show bf04bff886c9d070f691b96c9cccedd3a4263fbb:android/app/release-key.keystore > android/app/release-key.keystore
          cat > android/keystore.properties <<'EOF'
          storePassword=provera123
          keyPassword=provera123
          keyAlias=provera-key
          storeFile=release-key.keystore
          EOF

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build signed APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: provera-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: provera-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
