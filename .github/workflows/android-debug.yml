name: Build and Publish Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: provera-android-internal
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Capacitor
        run: npm run build:mobile

      - name: Restore registered Android signing key
        run: |
          git show bf04bff886c9d070f691b96c9cccedd3a4263fbb:android/app/release-key.keystore > android/app/release-key.keystore
          cat > android/keystore.properties <<'EOF'
          storePassword=provera123
          keyPassword=provera123
          keyAlias=provera-key
          storeFile=release-key.keystore
          EOF

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build signed APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: provera-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: provera-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Publish to Google Play internal testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.provera.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 0
          changesNotSentForReview: false
