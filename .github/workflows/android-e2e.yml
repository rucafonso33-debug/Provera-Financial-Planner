name: Android E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - '.maestro/**'
      - '.github/scripts/run-android-e2e.sh'
      - '.github/workflows/android-e2e.yml'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: provera-android-e2e
  cancel-in-progress: true

jobs:
  maestro-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Enable isolated E2E build
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('src/App.tsx')
          text = app_path.read_text()

          old_import = "import { GoogleAuthProvider, signInWithCredential, signInWithPopup } from 'firebase/auth';"
          new_import = "import { GoogleAuthProvider, signInAnonymously, signInWithCredential, signInWithPopup } from 'firebase/auth';"
          if old_import not in text:
              raise SystemExit('Could not locate Firebase auth import in App.tsx')
          text = text.replace(old_import, new_import, 1)

          app_marker = "function App() {"
          if app_marker not in text:
              raise SystemExit('Could not locate App function in App.tsx')
          text = text.replace(app_marker, "const E2E_TEST_MODE = true;\n\nfunction App() {", 1)

          loading_state = "  const [loading, setLoading] = useState(true);"
          if loading_state not in text:
              raise SystemExit('Could not locate loading state in App.tsx')
          text = text.replace(loading_state, "  const [loading, setLoading] = useState(!E2E_TEST_MODE);", 1)

          marker = "  // Firestore Sync\n"
          block = """  // Test-only authentication. This code exists only in the temporary CI build.\n  useEffect(() => {\n    if (!E2E_TEST_MODE || !isAuthReady || user || isSigningIn) return;\n\n    setIsSigningIn(true);\n    signInAnonymously(auth)\n      .catch((error) => {\n        console.error('Anonymous E2E sign-in error:', error);\n        setAuthError(error instanceof Error ? error.message : 'Anonymous test sign-in failed.');\n      })\n      .finally(() => setIsSigningIn(false));\n  }, [isAuthReady, user, isSigningIn]);\n\n"""

          if marker not in text:
              raise SystemExit('Could not locate Firestore marker in App.tsx')
          text = text.replace(marker, block + marker, 1)

          old_error = "    }, (err) => handleFirestoreError(err, OperationType.GET, `users/${userId}/settings/current`));"
          new_error = "    }, (err) => {\n      handleFirestoreError(err, OperationType.GET, `users/${userId}/settings/current`);\n      setLoading(false);\n    });"
          if old_error not in text:
              raise SystemExit('Could not locate Firestore settings error callback in App.tsx')
          text = text.replace(old_error, new_error, 1)

          auth_gate = "  if (!user) {"
          if auth_gate not in text:
              raise SystemExit('Could not locate signed-out landing gate in App.tsx')
          text = text.replace(auth_gate, "  if (!user && !E2E_TEST_MODE) {", 1)

          app_path.write_text(text)

          config_path = Path('capacitor.config.ts')
          config = config_path.read_text()
          server_block = "\n  server: {\n    hostname: 'provera-finance.vercel.app',\n    androidScheme: 'https'\n  }"
          if server_block not in config:
              raise SystemExit('Could not locate remote Capacitor server block')
          config = config.replace(server_block, '', 1)
          config_path.write_text(config)
          PY

      - name: Build E2E Android APK
        run: |
          npm run build:mobile
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd "$GITHUB_WORKSPACE"
          cp android/app/build/outputs/apk/debug/app-debug.apk provera-e2e.apk
          test -f provera-e2e.apk
          grep -R "Solo Mode" android/app/src/main/assets/public >/dev/null
          ls -lh provera-e2e.apk

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-snapshot-save -camera-back none
          disable-animations: true
          script: bash "$GITHUB_WORKSPACE/.github/scripts/run-android-e2e.sh"

      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/**
          if-no-files-found: warn
          retention-days: 14
