name: Android E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - '.maestro/**'
      - '.github/workflows/android-e2e.yml'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: provera-android-e2e
  cancel-in-progress: true

jobs:
  maestro-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Enable anonymous auth only in the E2E build
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/App.tsx')
          text = path.read_text()

          text = text.replace(
              "import { GoogleAuthProvider, signInWithCredential, signInWithPopup } from 'firebase/auth';",
              "import { GoogleAuthProvider, signInAnonymously, signInWithCredential, signInWithPopup } from 'firebase/auth';",
          )

          marker = "  // Firestore Sync\n"
          block = """  // Test-only authentication. This code exists only in the temporary CI build.\n  useEffect(() => {\n    if (import.meta.env.VITE_E2E_TEST_MODE !== 'true' || !isAuthReady || user || isSigningIn) return;\n\n    setIsSigningIn(true);\n    signInAnonymously(auth)\n      .catch((error) => {\n        console.error('Anonymous E2E sign-in error:', error);\n        setAuthError(error instanceof Error ? error.message : 'Anonymous test sign-in failed.');\n      })\n      .finally(() => setIsSigningIn(false));\n  }, [isAuthReady, user, isSigningIn]);\n\n"""

          if marker not in text:
              raise SystemExit('Could not locate Firestore marker in App.tsx')

          text = text.replace(marker, block + marker, 1)
          path.write_text(text)
          PY

      - name: Build E2E Android APK
        env:
          VITE_E2E_TEST_MODE: 'true'
        run: |
          npm run build:mobile
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-snapshot-save -camera-back none
          disable-animations: true
          script: |
            set -e
            adb wait-for-device
            adb shell input keyevent 82 || true
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true

            APK="android/app/build/outputs/apk/debug/app-debug.apk"
            test -f "$APK"

            adb install -r -t "$APK" || (sleep 15 && adb wait-for-device && adb install -r -t "$APK") || (sleep 20 && adb wait-for-device && adb install -r -t "$APK")
            maestro test .maestro/smoke.yaml --format junit --output maestro-results.xml

      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/**
          if-no-files-found: warn
          retention-days: 14
