name: Functional Contract Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/contracts/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/functional-contracts.yml'
  workflow_dispatch:

concurrency:
  group: provera-functional-contracts
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run functional regression contracts
        run: node --test tests/contracts/*.test.mjs

      - name: Type-check application
        run: npm run lint

      - name: Build production application
        run: npm run build
